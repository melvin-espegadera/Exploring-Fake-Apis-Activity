<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exploring APIs Using Fake Data</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body class="app-bg">
  <main class="container py-4">
    <section class="card border-0 shadow-sm simple-card">
      <div class="card-body p-4">
        <div class="mb-4">
          <h1 class="h2 mb-2 text-center">Exploring APIs Using Fake Data Activity</h1>
          <p class="mb-0">
            <span class="fw-semibold">API Source:</span>
            <a href="https://jsonplaceholder.typicode.com/users" target="_blank" rel="noreferrer">
              https://jsonplaceholder.typicode.com/users
            </a>
          </p>
        </div>

        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2 mb-3">
          <span id="status" class="badge rounded-pill text-bg-secondary px-3 py-2 status-pill" aria-live="polite">
            Loading API data...
          </span>
        </div>

        <div class="table-responsive">
          <table class="table table-bordered table-striped align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th scope="col">ID</th>
                <th scope="col">First Name</th>
                <th scope="col">Last Name</th>
                <th scope="col">Username</th>
                <th scope="col">Email</th>
                <th scope="col">Zipcode</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr>
                <td colspan="6" class="text-center py-4 text-secondary">Loading records...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
